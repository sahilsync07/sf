name: Build and Release Android App (Alpha)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: google-play-deploy-sf
  cancel-in-progress: false

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"
          cache-dependency-path: Frontend/package-lock.json

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "gradle"

      - name: Install dependencies and Build Web Assets
        run: |
          cd Frontend
          npm install
          npm run build:android
          npx cap sync android

      - name: Decode Keystore
        run: |
          mkdir -p Frontend/android/app
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | tr -d '\r\n' | sed 's/-----BEGIN CERTIFICATE-----//g' | sed 's/-----END CERTIFICATE-----//g' | base64 --decode > Frontend/android/app/release-key.keystore

      - name: Calculate Version Code
        id: version_code
        run: echo "code=$(( ${{ github.run_number }} + 110000 ))" >> $GITHUB_OUTPUT

      - name: Bump Version Code
        uses: chkfung/android-version-actions@v1.2.3
        with:
          gradlePath: Frontend/android/app/build.gradle
          versionCode: ${{ steps.version_code.outputs.code }}

      - name: Build Release Bundle
        working-directory: Frontend/android
        run: ./gradlew bundleRelease

      - name: Upload to Play Store (Alpha)
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: com.sf.stock.app
          releaseFiles: Frontend/android/app/build/outputs/bundle/release/app-release.aab
          track: alpha
          status: completed
